server:
  port: ${PORT:8080}

spring:
  application:
    name: dgu-admissions-backend

  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/dgu_admissions}

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

logging:
  level:
    ac.dgu: INFO
    org.springframework.data.mongodb: INFO
